<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Automated Blood Group Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Specific page alignment */
        body {
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="form-container card">
        <div class="form-header">
            <h2 id="login-title">Sign In</h2>
            <p>Enter your details to access the system</p>
        </div>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flashes" id="login-flashes">
            {% for category, message in messages %}
              <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <form action="/login" method="post" id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" required placeholder="Enter username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" required placeholder="Enter password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;" id="login-btn">Login</button>
        </form>

        <div class="form-footer">
            <p>Don't have an account? <a href="/signup" id="signup-link">Sign Up</a></p>
            <p style="margin-top: 15px;"><a href="/" id="back-home-link" style="color: var(--text-secondary);">&larr; Back to Home</a></p>
        </div>
    </div>
</body>
</html>
